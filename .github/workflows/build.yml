name: Build fotocompare

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyinstaller pillow

      - run: pyinstaller --onefile --name fotocompare --add-data "pngaaa.com-4830752.png:." fotocompare.py

      - uses: actions/upload-artifact@v4
        with:
          name: fotocompare-${{ runner.os }}
          path: dist/fotocompare*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/fotocompare*
