name: Build fotocompare

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyinstaller pillow piexif

      - run: pyinstaller --onefile --name fotocompare --hidden-import piexif --add-data "pngaaa.com-4830752.png;." fotocompare.py
        if: runner.os == 'Windows'
      - run: pyinstaller --onefile --name fotocompare --hidden-import piexif --add-data "pngaaa.com-4830752.png:." fotocompare.py
        if: runner.os != 'Windows'

      - name: Rename per OS
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/fotocompare.exe "dist/fotocompare-windows.exe"
          else
            mv dist/fotocompare "dist/fotocompare-${{ runner.os }}"
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: fotocompare-${{ runner.os }}
          path: dist/fotocompare-*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/fotocompare-*
